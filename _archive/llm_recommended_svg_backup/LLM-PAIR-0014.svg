<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960">
  <defs>
    <filter id="shadow_llm"><feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dx="0" dy="8"/><feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1280" height="960" fill="#0f172a"/>
  
  
        <!-- 어두운 산업 환경 -->
        <defs>
          <radialGradient id="spot_PAIR-0014" cx="0.5" cy="0.5" r="0.7">
            <stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#0f172a"/>
          </radialGradient>
        </defs>
        <rect x="0" y="120" width="1280" height="840" fill="url(#spot_PAIR-0014)"/>
        <!-- 산업 기계 (단순 실루엣) -->
        <g transform="translate(640, 540)" filter="url(#shadow_llm)">
          <ellipse cx="0" cy="200" rx="240" ry="20" fill="#000" opacity="0.7"/>
          <rect x="-200" y="-100" width="400" height="280" rx="20" fill="#475569" stroke="#1e293b" stroke-width="4"/>
          <rect x="-200" y="-100" width="400" height="60" rx="20" fill="#64748b"/>
          <text x="0" y="-60" text-anchor="middle" font-size="28" font-weight="900" fill="white" letter-spacing="6" style="font-family:sans-serif">PROTECTED</text>
          <!-- 케이지 -->
          <g stroke="#fb923c" stroke-width="6" fill="none">
            <rect x="-180" y="-40" width="360" height="200" rx="10"/>
            <line x1="-180" y1="20" x2="180" y2="20"/>
            <line x1="-180" y1="80" x2="180" y2="80"/>
            <line x1="-180" y1="140" x2="180" y2="140"/>
            <line x1="-120" y1="-40" x2="-120" y2="160"/>
            <line x1="-60" y1="-40" x2="-60" y2="160"/>
            <line x1="0" y1="-40" x2="0" y2="160"/>
            <line x1="60" y1="-40" x2="60" y2="160"/>
            <line x1="120" y1="-40" x2="120" y2="160"/>
          </g>
          <!-- 회전 휠 (희미하게) -->
          <circle cx="0" cy="60" r="60" fill="#1e293b" stroke="#fb923c" stroke-width="3" stroke-dasharray="5 5"/>
          <circle cx="0" cy="60" r="40" fill="none" stroke="#94a3b8" stroke-width="2"/>
        </g>
  
  <!-- 상단 라벨 (여백 최소화) -->
  <g transform="translate(640, 55)">
    <rect x="-200" y="-26" width="400" height="52" rx="26" fill="white" stroke="#0ea5e9" stroke-width="3" filter="url(#shadow_llm)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#0ea5e9" style="font-family:&apos;Pretendard&apos;,sans-serif">🤖 LLM 추천: 핸드그라인더 PPE</text>
  </g>
  
  <!-- LLM 마크 (코너) -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#0ea5e9"/>
    <text x="50" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5" style="font-family:sans-serif">LLM ✦ SAFEG</text>
  </g>
  
  <!-- 키워드 캡션 (하단) -->
  <g transform="translate(640, 920)">
    <rect x="-300" y="-22" width="600" height="40" rx="20" fill="rgba(0,0,0,0.6)"/>
    <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="600" fill="white" style="font-family:sans-serif">🔍 검색 키워드: angle grinder PPE</text>
  </g>
</svg>