<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <!-- 각 색상별 테이프 그라데이션 -->
    <linearGradient id="redTape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7f1d1d"/><stop offset="50%" stop-color="#dc2626"/><stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="yellowTape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a16207"/><stop offset="50%" stop-color="#facc15"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="greenTape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14532d"/><stop offset="50%" stop-color="#22c55e"/><stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="grayTape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2937"/><stop offset="50%" stop-color="#9ca3af"/><stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="blackTape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/><stop offset="50%" stop-color="#404040"/><stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    
    <!-- 텍스처 패턴 (미끄럼방지 표면) -->
    <pattern id="grit" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none"/>
      <circle cx="2" cy="2" r="0.8" fill="black" opacity="0.3"/>
      <circle cx="6" cy="5" r="0.6" fill="black" opacity="0.25"/>
      <circle cx="3" cy="6" r="0.7" fill="black" opacity="0.3"/>
    </pattern>
    
    <!-- 그림자 필터 -->
    <filter id="dropS" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="3" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 흰색 배경 -->
  <rect width="600" height="600" fill="#ffffff"/>
  
  <!-- 제품명 텍스트 (상단) -->
  <g transform="translate(300, 70)">
    <text x="0" y="0" text-anchor="middle" font-size="32" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">WS논슬립</text>
    <text x="0" y="42" text-anchor="middle" font-size="28" font-weight="800" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">미끄럼방지테이프 5cm x 5M</text>
  </g>
  
  <!-- 테이프 롤들 (5개 색상, 비스듬히 배치) -->
  
  <!-- 빨간 테이프 (뒤쪽 좌측) -->
  <g transform="translate(110, 320) rotate(-12)" filter="url(#dropS)">
    <!-- 롤 본체 (원기둥) -->
    <ellipse cx="0" cy="-50" rx="55" ry="14" fill="#dc2626"/>
    <rect x="-55" y="-50" width="110" height="180" fill="url(#redTape)"/>
    <ellipse cx="0" cy="130" rx="55" ry="14" fill="#7f1d1d"/>
    <!-- 텍스처 -->
    <rect x="-55" y="-50" width="110" height="180" fill="url(#grit)"/>
    <!-- 가운데 구멍 (튜브) -->
    <ellipse cx="0" cy="-50" rx="22" ry="6" fill="#7f1d1d"/>
    <ellipse cx="0" cy="-52" rx="18" ry="4.5" fill="#fee2e2"/>
    <!-- 측면 빛 반사 -->
    <ellipse cx="-25" cy="40" rx="6" ry="55" fill="white" opacity="0.2"/>
  </g>
  
  <!-- 노란 테이프 -->
  <g transform="translate(220, 290) rotate(-8)" filter="url(#dropS)">
    <ellipse cx="0" cy="-55" rx="58" ry="15" fill="#facc15"/>
    <rect x="-58" y="-55" width="116" height="200" fill="url(#yellowTape)"/>
    <ellipse cx="0" cy="145" rx="58" ry="15" fill="#a16207"/>
    <rect x="-58" y="-55" width="116" height="200" fill="url(#grit)"/>
    <ellipse cx="0" cy="-55" rx="23" ry="6" fill="#a16207"/>
    <ellipse cx="0" cy="-57" rx="19" ry="4.5" fill="#fef3c7"/>
    <ellipse cx="-25" cy="45" rx="6" ry="60" fill="white" opacity="0.25"/>
  </g>
  
  <!-- 녹색 테이프 (중앙) -->
  <g transform="translate(340, 280) rotate(-3)" filter="url(#dropS)">
    <ellipse cx="0" cy="-58" rx="60" ry="15" fill="#22c55e"/>
    <rect x="-60" y="-58" width="120" height="220" fill="url(#greenTape)"/>
    <ellipse cx="0" cy="162" rx="60" ry="15" fill="#14532d"/>
    <rect x="-60" y="-58" width="120" height="220" fill="url(#grit)"/>
    <ellipse cx="0" cy="-58" rx="24" ry="6" fill="#14532d"/>
    <ellipse cx="0" cy="-60" rx="20" ry="5" fill="#dcfce7"/>
    <ellipse cx="-26" cy="50" rx="6" ry="65" fill="white" opacity="0.22"/>
  </g>
  
  <!-- 회색 테이프 -->
  <g transform="translate(450, 295) rotate(3)" filter="url(#dropS)">
    <ellipse cx="0" cy="-55" rx="58" ry="15" fill="#9ca3af"/>
    <rect x="-58" y="-55" width="116" height="210" fill="url(#grayTape)"/>
    <ellipse cx="0" cy="155" rx="58" ry="15" fill="#374151"/>
    <rect x="-58" y="-55" width="116" height="210" fill="url(#grit)"/>
    <ellipse cx="0" cy="-55" rx="23" ry="6" fill="#374151"/>
    <ellipse cx="0" cy="-57" rx="19" ry="4.5" fill="#f3f4f6"/>
    <ellipse cx="-25" cy="50" rx="6" ry="60" fill="white" opacity="0.28"/>
  </g>
  
  <!-- 검정 테이프 (뒤쪽 우측) -->
  <g transform="translate(540, 320) rotate(10)" filter="url(#dropS)">
    <ellipse cx="0" cy="-50" rx="55" ry="14" fill="#404040"/>
    <rect x="-55" y="-50" width="110" height="190" fill="url(#blackTape)"/>
    <ellipse cx="0" cy="140" rx="55" ry="14" fill="#0a0a0a"/>
    <rect x="-55" y="-50" width="110" height="190" fill="url(#grit)" opacity="0.5"/>
    <ellipse cx="0" cy="-50" rx="22" ry="6" fill="#0a0a0a"/>
    <ellipse cx="0" cy="-52" rx="18" ry="4.5" fill="#525252"/>
    <ellipse cx="-25" cy="45" rx="6" ry="55" fill="white" opacity="0.15"/>
  </g>
  
  <!-- 그림자 (바닥) -->
  <ellipse cx="320" cy="510" rx="240" ry="20" fill="#000" opacity="0.15"/>
</svg>