<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bgSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <!-- 안전조끼 (주황) -->
    <linearGradient id="vestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <!-- 흰색 안전모 -->
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- 노란 안전모 -->
    <linearGradient id="helmetYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 청바지/회색 바지 -->
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- 피부톤 -->
    <radialGradient id="skinGrad" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <!-- 노란 안전대 -->
    <linearGradient id="harnessGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 부드러운 그림자 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1280" height="960" fill="#ecfdf5"/>
  <rect x="0" y="660" width="1280" height="300" fill="#a8a29e"/>
  
  <!-- MSDS 게시판 -->
  <g transform="translate(420, 300)" filter="url(#softShadow)">
    <rect x="0" y="0" width="440" height="500" rx="12" fill="white" stroke="#0f172a" stroke-width="5"/>
    <rect x="0" y="0" width="440" height="90" rx="12" fill="#dc2626"/>
    <text x="220" y="50" text-anchor="middle" font-size="44" font-weight="900" fill="white" style="font-family:sans-serif">MSDS</text>
    <text x="220" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="white" letter-spacing="3" style="font-family:sans-serif">물질안전보건자료</text>
    <!-- 내용 라인 -->
    <g fill="#0f172a" font-family="sans-serif">
      <rect x="30" y="115" width="380" height="28" fill="#e2e8f0"/>
      <text x="42" y="135" font-size="16" font-weight="700">1. 화학제품 정보</text>
      <line x1="30" y1="160" x2="380" y2="160" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="30" y1="180" x2="350" y2="180" stroke="#cbd5e1" stroke-width="2"/>
      
      <rect x="30" y="210" width="380" height="28" fill="#fee2e2"/>
      <text x="42" y="230" font-size="16" font-weight="700" fill="#dc2626">2. 유해성·위험성</text>
      <line x1="30" y1="252" x2="380" y2="252" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="30" y1="272" x2="360" y2="272" stroke="#cbd5e1" stroke-width="2"/>
      
      <rect x="30" y="300" width="380" height="28" fill="#e2e8f0"/>
      <text x="42" y="320" font-size="16" font-weight="700">3. 응급조치</text>
      <line x1="30" y1="345" x2="380" y2="345" stroke="#cbd5e1" stroke-width="2"/>
      
      <rect x="30" y="375" width="380" height="28" fill="#fef3c7"/>
      <text x="42" y="395" font-size="16" font-weight="700" fill="#92400e">4. 노출방지·개인보호구</text>
      <line x1="30" y1="420" x2="380" y2="420" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="30" y1="440" x2="350" y2="440" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="30" y1="460" x2="330" y2="460" stroke="#cbd5e1" stroke-width="2"/>
    </g>
  </g>
  
  <!-- 작업자 (보호구 착용) -->

    <g transform="translate(180, 480)" filter="url(#softShadow)">
      <!-- 그림자 -->
      <ellipse cx="0" cy="240" rx="58" ry="9" fill="#000" opacity="0.2"/>
      <!-- 다리 -->
      <path d="M-22,150 Q-25,200 -25,238 L-15,240 L-10,160 Z" fill="url(#pantsGrad)" stroke="#0f172a" stroke-width="1.5"/>
      <path d="M10,160 L15,240 L25,238 Q25,200 22,150 Z" fill="url(#pantsGrad)" stroke="#0f172a" stroke-width="1.5"/>
      <!-- 안전화 -->
      <ellipse cx="-20" cy="242" rx="20" ry="6" fill="#0f172a"/>
      <ellipse cx="20" cy="242" rx="20" ry="6" fill="#0f172a"/>
      <rect x="-38" y="237" width="36" height="3" fill="#fbbf24"/>
      <rect x="2" y="237" width="36" height="3" fill="#fbbf24"/>
      <!-- 몸통 (안전조끼) -->
      <path d="M-38,70 Q-40,95 -40,150 L-22,155 L-22,80 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
      <path d="M22,80 L22,155 L40,150 Q40,95 38,70 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
      <path d="M-22,80 L22,80 L22,160 L-22,160 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
      <!-- 형광 줄무늬 -->
      <rect x="-40" y="110" width="80" height="5" fill="#fef3c7"/>
      <rect x="-40" y="140" width="80" height="5" fill="#fef3c7"/>
      <!-- 안전대 D링 + 끈 -->
      <line x1="-18" y1="80" x2="-18" y2="150" stroke="url(#harnessGrad)" stroke-width="4"/>
      <line x1="18" y1="80" x2="18" y2="150" stroke="url(#harnessGrad)" stroke-width="4"/>
      <line x1="-18" y1="115" x2="18" y2="115" stroke="url(#harnessGrad)" stroke-width="4"/>
      <circle cx="0" cy="118" r="7" fill="#fcd34d" stroke="#92400e" stroke-width="2"/>
      <!-- 팔 -->
      <path d="M-38,75 Q-50,100 -52,140 L-42,143 L-30,82 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
      <path d="M30,82 L42,143 L52,140 Q50,100 38,75 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
      <!-- 손 -->
      <circle cx="-47" cy="143" r="9" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="1.5"/>
      <circle cx="47" cy="143" r="9" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="1.5"/>
      <!-- 머리 -->
      <ellipse cx="0" cy="32" rx="26" ry="29" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="2"/>
      <!-- 얼굴 디테일 -->
      <ellipse cx="-9" cy="33" rx="2.5" ry="3" fill="#1e293b"/>
      <ellipse cx="9" cy="33" rx="2.5" ry="3" fill="#1e293b"/>
      <path d="M-5,46 Q0,49 5,46" fill="none" stroke="#9a3412" stroke-width="2" stroke-linecap="round"/>
      <!-- 안전모 -->
      <path d="M-30,30 Q-30,-6 0,-12 Q30,-6 30,30 L30,34 L-30,34 Z" fill="url(#helmetYellow)" stroke="#1e293b" stroke-width="2"/>
      <ellipse cx="0" cy="6" rx="32" ry="6" fill="#94a3b8"/>
      <path d="M-30,34 L-34,40 L34,40 L30,34 Z" fill="#94a3b8" stroke="#1e293b" stroke-width="1.5"/>
      <!-- 턱끈 -->
      <path d="M-22,45 Q0,55 22,45" fill="none" stroke="#9a3412" stroke-width="1.5"/>
    </g>
  
  <!-- 화학물질 통 (우측) -->
  <g transform="translate(960, 480)" filter="url(#softShadow)">
    <ellipse cx="60" cy="280" rx="75" ry="12" fill="#000" opacity="0.3"/>
    <rect x="0" y="40" width="120" height="240" rx="6" fill="url(#helmetYellow)" stroke="#7c2d12" stroke-width="3"/>
    <ellipse cx="60" cy="40" rx="60" ry="12" fill="#f59e0b" stroke="#7c2d12" stroke-width="3"/>
    <ellipse cx="60" cy="32" rx="58" ry="10" fill="#fde047"/>
    <!-- 라벨 -->
    <rect x="12" y="80" width="96" height="160" fill="white" stroke="#dc2626" stroke-width="3"/>
    <text x="60" y="115" text-anchor="middle" font-size="18" font-weight="900" fill="#dc2626" style="font-family:sans-serif">DANGER</text>
    <path d="M60,130 L88,160 L60,190 L32,160 Z" fill="white" stroke="#dc2626" stroke-width="3"/>
    <text x="60" y="170" text-anchor="middle" font-size="24" font-weight="900" fill="#dc2626" style="font-family:sans-serif">!</text>
    <text x="60" y="215" text-anchor="middle" font-size="14" font-weight="900" fill="#dc2626" style="font-family:sans-serif">유기용제</text>
    <text x="60" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#525252" style="font-family:sans-serif">MSDS-A-01</text>
  </g>
  
  <!-- 안전 라벨 -->
  <g transform="translate(180, 320)" filter="url(#softShadow)">
    <rect x="-100" y="-32" width="200" height="64" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="20" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">MSDS 게시</text>
    <text x="0" y="22" text-anchor="middle" font-size="20" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">+ 특별교육</text>
    <path d="M70,30 L260,320" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowR)"/>
  </g>
  
  <g transform="translate(640, 55)">
    <rect x="-200" y="-26" width="400" height="52" rx="26" fill="white" stroke="#5b47eb" stroke-width="3" filter="url(#softShadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#5b47eb" style="font-family:&apos;Pretendard&apos;,sans-serif">✦ 자재창고 안전표기 + MSDS</text>
  </g>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#5b47eb"/>
    <text x="45" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5" style="font-family:sans-serif">AI ✦ SAFEG</text>
  </g>
</svg>