<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bgSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <!-- 안전조끼 (주황) -->
    <linearGradient id="vestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <!-- 흰색 안전모 -->
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- 노란 안전모 -->
    <linearGradient id="helmetYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 청바지/회색 바지 -->
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- 피부톤 -->
    <radialGradient id="skinGrad" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <!-- 노란 안전대 -->
    <linearGradient id="harnessGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 부드러운 그림자 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1280" height="960" fill="#fefce8"/>
  <!-- 식당 바닥 (타일) -->
  <rect x="0" y="600" width="1280" height="360" fill="#e2e8f0"/>
  <g stroke="#94a3b8" stroke-width="2" opacity="0.5">
    <line x1="160" y1="600" x2="160" y2="960"/>
    <line x1="320" y1="600" x2="320" y2="960"/>
    <line x1="480" y1="600" x2="480" y2="960"/>
    <line x1="640" y1="600" x2="640" y2="960"/>
    <line x1="800" y1="600" x2="800" y2="960"/>
    <line x1="960" y1="600" x2="960" y2="960"/>
    <line x1="1120" y1="600" x2="1120" y2="960"/>
    <line x1="0" y1="720" x2="1280" y2="720"/>
    <line x1="0" y1="840" x2="1280" y2="840"/>
  </g>
  
  <!-- 미끄럼방지 테이프 (바닥에 부착) -->
  <g transform="translate(160, 800)" filter="url(#softShadow)">
    <rect x="0" y="-20" width="700" height="40" fill="#fbbf24" stroke="#92400e" stroke-width="3"/>
    <g stroke="#92400e" stroke-width="3" opacity="0.6">
      <line x1="20" y1="-15" x2="40" y2="15"/>
      <line x1="60" y1="-15" x2="80" y2="15"/>
      <line x1="100" y1="-15" x2="120" y2="15"/>
      <line x1="140" y1="-15" x2="160" y2="15"/>
      <line x1="180" y1="-15" x2="200" y2="15"/>
      <line x1="220" y1="-15" x2="240" y2="15"/>
      <line x1="260" y1="-15" x2="280" y2="15"/>
      <line x1="300" y1="-15" x2="320" y2="15"/>
      <line x1="340" y1="-15" x2="360" y2="15"/>
      <line x1="380" y1="-15" x2="400" y2="15"/>
      <line x1="420" y1="-15" x2="440" y2="15"/>
      <line x1="460" y1="-15" x2="480" y2="15"/>
      <line x1="500" y1="-15" x2="520" y2="15"/>
      <line x1="540" y1="-15" x2="560" y2="15"/>
      <line x1="580" y1="-15" x2="600" y2="15"/>
      <line x1="620" y1="-15" x2="640" y2="15"/>
      <line x1="660" y1="-15" x2="680" y2="15"/>
    </g>
    <text x="350" y="8" text-anchor="middle" font-size="22" font-weight="900" fill="#92400e" style="font-family:sans-serif">NON-SLIP TAPE</text>
  </g>
  
  <!-- 작업자 (바닥에 테이프 부착 중) -->
  <g transform="translate(450, 480)" filter="url(#softShadow)">
    <ellipse cx="0" cy="290" rx="60" ry="10" fill="#000" opacity="0.25"/>
    <!-- 다리 (구부린 자세) -->
    <path d="M-22,160 Q-30,200 -20,260 L-5,265 L-3,170 Z" fill="url(#pantsGrad)" stroke="#0f172a" stroke-width="1.5"/>
    <path d="M3,170 L5,265 L25,290 L40,285 L20,235 L22,160 Z" fill="url(#pantsGrad)" stroke="#0f172a" stroke-width="1.5"/>
    <ellipse cx="-12" cy="275" rx="20" ry="6" fill="#0f172a"/>
    <ellipse cx="32" cy="288" rx="20" ry="6" fill="#0f172a"/>
    <!-- 몸통 (앞으로 숙인 자세) -->
    <path d="M-38,75 L40,75 L50,165 L-25,170 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
    <rect x="-32" y="105" width="80" height="5" fill="#fef3c7"/>
    <rect x="-25" y="140" width="80" height="5" fill="#fef3c7"/>
    <!-- 팔 (앞으로 뻗어서 테이프 부착) -->
    <path d="M40,80 Q70,130 110,170 L100,180 L30,90 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
    <path d="M-38,80 Q-50,120 -50,150 L-40,155 L-30,90 Z" fill="url(#vestGrad)" stroke="#9a3412" stroke-width="2"/>
    <!-- 손 -->
    <circle cx="105" cy="175" r="10" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="1.5"/>
    <circle cx="-45" cy="153" r="9" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="1.5"/>
    <!-- 머리 (살짝 숙인) -->
    <ellipse cx="-5" cy="40" rx="26" ry="29" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="2"/>
    <ellipse cx="-13" cy="40" rx="2.5" ry="3" fill="#1e293b"/>
    <ellipse cx="3" cy="40" rx="2.5" ry="3" fill="#1e293b"/>
    <path d="M-10,52 Q-5,55 0,52" fill="none" stroke="#9a3412" stroke-width="2" stroke-linecap="round"/>
    <!-- 흰색 안전모 -->
    <path d="M-32,38 Q-32,2 -5,-4 Q22,2 22,38 L22,42 L-32,42 Z" fill="url(#helmetGrad)" stroke="#1e293b" stroke-width="2"/>
    <ellipse cx="-5" cy="14" rx="29" ry="6" fill="#cbd5e1"/>
    <path d="M-32,42 L-34,47 L24,47 L22,42 Z" fill="#94a3b8" stroke="#1e293b" stroke-width="1.5"/>
  </g>
  
  <!-- 미끄럼방지 안전표지판 (벽에 부착) -->
  <g transform="translate(900, 280)" filter="url(#softShadow)">
    <rect x="-10" y="180" width="20" height="180" fill="#525252"/>
    <ellipse cx="0" cy="365" rx="40" ry="8" fill="#525252"/>
    <path d="M0,-30 L130,150 L-130,150 Z" fill="#fde047" stroke="#dc2626" stroke-width="6" stroke-linejoin="round"/>
    <g transform="translate(0, 100)" fill="#1e293b">
      <circle cx="-5" cy="-30" r="13"/>
      <path d="M-25,-15 Q-32,5 -10,12 L20,12 L25,22 L-5,22 L-25,12 Z"/>
      <path d="M5,5 L25,18 L35,32 L30,35 L18,22 L0,12 Z"/>
      <path d="M-5,15 L-20,32 L-15,35 L0,18 Z"/>
      <line x1="-40" y1="40" x2="40" y2="40" stroke="#1e293b" stroke-width="6"/>
    </g>
    <text x="0" y="130" text-anchor="middle" font-size="22" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">미끄럼 주의</text>
  </g>
  
  <!-- 안전 라벨 -->
  <g transform="translate(220, 360)" filter="url(#softShadow)">
    <rect x="-100" y="-32" width="200" height="64" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="20" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">논슬립 테이프</text>
    <text x="0" y="22" text-anchor="middle" font-size="20" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">+ 안전장화</text>
    <path d="M30,35 L220,420" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowR)"/>
  </g>
  
  <g transform="translate(640, 55)">
    <rect x="-200" y="-26" width="400" height="52" rx="26" fill="white" stroke="#5b47eb" stroke-width="3" filter="url(#softShadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#5b47eb" style="font-family:&apos;Pretendard&apos;,sans-serif">✦ 논슬립 + 안전표지 + 안전장화</text>
  </g>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#5b47eb"/>
    <text x="45" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5" style="font-family:sans-serif">AI ✦ SAFEG</text>
  </g>
</svg>