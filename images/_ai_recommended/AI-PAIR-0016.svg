<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960">
  <defs>
    <linearGradient id="bgWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/><stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a3a3a3"/><stop offset="100%" stop-color="#737373"/>
    </linearGradient>
    <linearGradient id="vestOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="helmetW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="pantsBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b5563"/><stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="skinTone" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#fdba74"/>
    </radialGradient>
    <linearGradient id="rail16" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <filter id="softShadow"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="0" dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <!-- 따뜻한 베이지 배경 -->
  <rect width="1280" height="960" fill="url(#bgWarm)"/>
  
  <!-- 하늘 영역 (가벼운 푸른빛) -->
  <rect x="0" y="0" width="1280" height="500" fill="#dbeafe" opacity="0.4"/>
  
  <!-- 옥상 콘크리트 표면 -->
  <path d="M0,640 L1280,610 L1280,960 L0,960 Z" fill="url(#roofGrad)"/>
  <g stroke="#525252" stroke-width="1.5" opacity="0.4">
    <line x1="0" y1="720" x2="1280" y2="700"/>
    <line x1="0" y1="800" x2="1280" y2="785"/>
    <line x1="0" y1="880" x2="1280" y2="870"/>
    <line x1="300" y1="640" x2="290" y2="960"/>
    <line x1="700" y1="625" x2="700" y2="960"/>
    <line x1="1000" y1="615" x2="1015" y2="960"/>
  </g>
  
  <!-- 안전난간 시스템 (정교한 디테일) -->
  <g filter="url(#softShadow)">
    <!-- 기둥 -->
    <g fill="url(#rail16)" stroke="#7c2d12" stroke-width="2.5">
      <rect x="160" y="380" width="18" height="240" rx="2"/>
      <rect x="380" y="380" width="18" height="240" rx="2"/>
      <rect x="600" y="380" width="18" height="240" rx="2"/>
      <rect x="820" y="380" width="18" height="240" rx="2"/>
      <rect x="1040" y="380" width="18" height="240" rx="2"/>
    </g>
    <!-- 상부 난간대 -->
    <rect x="140" y="378" width="940" height="22" rx="11" fill="url(#rail16)" stroke="#7c2d12" stroke-width="2.5"/>
    <!-- 중간 난간대 -->
    <rect x="140" y="488" width="940" height="16" rx="8" fill="url(#rail16)" stroke="#7c2d12" stroke-width="2.5"/>
    <!-- 하부 발 보호판 (검정/노랑 줄무늬) -->
    <rect x="140" y="595" width="940" height="25" fill="#fcd34d" stroke="#78350f" stroke-width="2"/>
    <g fill="#1f2937">
      <rect x="180" y="595" width="40" height="25"/>
      <rect x="280" y="595" width="40" height="25"/>
      <rect x="380" y="595" width="40" height="25"/>
      <rect x="480" y="595" width="40" height="25"/>
      <rect x="580" y="595" width="40" height="25"/>
      <rect x="680" y="595" width="40" height="25"/>
      <rect x="780" y="595" width="40" height="25"/>
      <rect x="880" y="595" width="40" height="25"/>
      <rect x="980" y="595" width="40" height="25"/>
    </g>
  </g>
  
  <!-- 작업자 (사용자 참고 이미지 스타일) -->
  <g transform="translate(620, 380)" filter="url(#softShadow)">
    <!-- 그림자 -->
    <ellipse cx="0" cy="240" rx="70" ry="10" fill="#000" opacity="0.25"/>
    
    <!-- 다리 (청바지) -->
    <path d="M-30,140 L-30,235 L-12,238 L-15,150 Z" fill="url(#pantsBlue)" stroke="#1e293b" stroke-width="2"/>
    <path d="M15,150 L12,238 L30,235 L30,140 Z" fill="url(#pantsBlue)" stroke="#1e293b" stroke-width="2"/>
    
    <!-- 안전화 (검정 + 노란 줄) -->
    <ellipse cx="-22" cy="240" rx="22" ry="8" fill="#0f172a"/>
    <ellipse cx="22" cy="240" rx="22" ry="8" fill="#0f172a"/>
    <path d="M-40,238 L-5,238 L-5,232 L-30,228 Z" fill="#1e293b"/>
    <path d="M5,238 L40,238 L30,228 L5,232 Z" fill="#1e293b"/>
    <rect x="-42" y="236" width="40" height="3" fill="#fbbf24"/>
    <rect x="2" y="236" width="40" height="3" fill="#fbbf24"/>
    
    <!-- 몸통 (안전조끼 주황) -->
    <path d="M-42,60 L42,60 L48,170 L-48,170 Z" fill="url(#vestOrange)" stroke="#9a3412" stroke-width="2.5"/>
    <!-- 형광 줄 -->
    <rect x="-48" y="95" width="96" height="6" fill="#fef3c7"/>
    <rect x="-48" y="135" width="96" height="6" fill="#fef3c7"/>
    
    <!-- 안전대 (전신 벨트) -->
    <path d="M-30,60 L30,60" stroke="#fbbf24" stroke-width="4"/>
    <path d="M-25,80 L25,80 L25,140 L-25,140 Z" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <line x1="-25" y1="100" x2="25" y2="100" stroke="#fbbf24" stroke-width="3"/>
    <line x1="0" y1="80" x2="0" y2="140" stroke="#fbbf24" stroke-width="3"/>
    <!-- D링 + 후크 -->
    <circle cx="0" cy="58" r="10" fill="#fcd34d" stroke="#92400e" stroke-width="2"/>
    
    <!-- 안전 로프 (난간으로 연결) -->
    <path d="M0,58 Q-60,30 -120,0 Q-180,-20 -220,-30" fill="none" stroke="#dc2626" stroke-width="6"/>
    <path d="M0,58 Q-60,30 -120,0 Q-180,-20 -220,-30" fill="none" stroke="#fca5a5" stroke-width="2" stroke-dasharray="3 4"/>
    <!-- 후크 -->
    <g transform="translate(-220, -30)">
      <rect x="-5" y="-3" width="18" height="14" rx="2" fill="#475569" stroke="#1e293b" stroke-width="2"/>
      <path d="M0,-12 Q-10,-3 -2,5" fill="none" stroke="#475569" stroke-width="5"/>
    </g>
    
    <!-- 팔 (위로 들고 작업하는 자세) -->
    <path d="M-40,70 Q-50,90 -50,130 L-38,135 L-30,90 Z" fill="url(#vestOrange)" stroke="#9a3412" stroke-width="2"/>
    <path d="M40,70 Q50,90 50,130 L38,135 L30,90 Z" fill="url(#vestOrange)" stroke="#9a3412" stroke-width="2"/>
    <!-- 손 -->
    <circle cx="-44" cy="135" r="10" fill="url(#skinTone)" stroke="#9a3412" stroke-width="1.5"/>
    <circle cx="44" cy="135" r="10" fill="url(#skinTone)" stroke="#9a3412" stroke-width="1.5"/>
    
    <!-- 머리 -->
    <circle cx="0" cy="20" r="28" fill="url(#skinTone)" stroke="#9a3412" stroke-width="2"/>
    <!-- 얼굴 디테일 -->
    <circle cx="-9" cy="20" r="2.5" fill="#1e293b"/>
    <circle cx="9" cy="20" r="2.5" fill="#1e293b"/>
    <path d="M-6,32 Q0,36 6,32" fill="none" stroke="#9a3412" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 안전모 (흰색) -->
    <path d="M-32,18 Q0,-22 32,18 L32,22 L-32,22 Z" fill="url(#helmetW)" stroke="#475569" stroke-width="2.5"/>
    <ellipse cx="0" cy="2" rx="34" ry="6" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
    <!-- 안전모 챙 -->
    <path d="M-32,22 L-34,28 L34,28 L32,22 Z" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>
    <!-- 안전모 턱끈 -->
    <path d="M-22,32 Q0,42 22,32" fill="none" stroke="#9a3412" stroke-width="2"/>
  </g>
  
  <!-- 안전 메시지 라벨 1: "안전난간 90cm" (좌측, 화살표로 난간 가리킴) -->
  <g transform="translate(220, 280)" filter="url(#softShadow)">
    <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-2" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">안전난간</text>
    <text x="0" y="22" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">90cm 이상</text>
    <!-- 화살표 -->
    <path d="M40,35 L80,90" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowL16)"/>
  </g>
  
  <!-- 안전 메시지 라벨 2: "안전모·안전대 착용" (작업자 우측) -->
  <g transform="translate(900, 320)" filter="url(#softShadow)">
    <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-2" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">안전모·안전대</text>
    <text x="0" y="22" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">착용 철저</text>
    <path d="M-50,30 L-160,80" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowL16)"/>
  </g>
  
  <!-- 출입금지 안내 라벨 (하단) -->
  <g transform="translate(220, 700)" filter="url(#softShadow)">
    <rect x="-100" y="-30" width="200" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <circle cx="-65" cy="0" r="18" fill="none" stroke="#dc2626" stroke-width="4"/>
    <line x1="-78" y1="-13" x2="-52" y2="13" stroke="#dc2626" stroke-width="4"/>
    <text x="20" y="-3" text-anchor="middle" font-size="16" font-weight="900" fill="#dc2626" style="font-family:&apos;Pretendard&apos;,sans-serif">관계자외</text>
    <text x="20" y="18" text-anchor="middle" font-size="16" font-weight="900" fill="#dc2626" style="font-family:&apos;Pretendard&apos;,sans-serif">출입금지</text>
  </g>
  
  <defs>
    <marker id="arrowL16" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#dc2626"/>
    </marker>
  </defs>
  
  <!-- 상단 AI 라벨 -->
  <g transform="translate(640, 55)">
    <rect x="-220" y="-26" width="440" height="52" rx="26" fill="white" stroke="#5b47eb" stroke-width="3" filter="url(#softShadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#5b47eb" style="font-family:&apos;Pretendard&apos;,sans-serif">✦ 옥상 안전난간 + 안전대 + 출입금지</text>
  </g>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#5b47eb"/>
    <text x="45" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5" style="font-family:sans-serif">AI ✦ SAFEG</text>
  </g>
</svg>