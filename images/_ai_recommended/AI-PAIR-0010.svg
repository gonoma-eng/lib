<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bgSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <!-- 안전조끼 (주황) -->
    <linearGradient id="vestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <!-- 흰색 안전모 -->
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- 노란 안전모 -->
    <linearGradient id="helmetYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 청바지/회색 바지 -->
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- 피부톤 -->
    <radialGradient id="skinGrad" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <!-- 노란 안전대 -->
    <linearGradient id="harnessGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 부드러운 그림자 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1280" height="960" fill="url(#bgSoft)"/>
  <rect x="0" y="660" width="1280" height="300" fill="#a8a29e"/>
  <line x1="0" y1="660" x2="1280" y2="660" stroke="#525252" stroke-width="2"/>
  <!-- 안전거리 점선 원 -->
  <ellipse cx="780" cy="800" rx="320" ry="35" fill="none" stroke="#facc15" stroke-width="5" stroke-dasharray="15 10"/>
  
  <!-- 백호우 (굴삭기) — 정교한 일러스트 -->
  <g transform="translate(680, 380)" filter="url(#softShadow)">
    <!-- 캐터필러 트랙 -->
    <rect x="-10" y="290" width="380" height="55" rx="27" fill="#0f172a"/>
    <rect x="5" y="298" width="350" height="40" rx="20" fill="#1e293b"/>
    <circle cx="35" cy="318" r="20" fill="#fbbf24" stroke="#92400e" stroke-width="2"/>
    <circle cx="35" cy="318" r="10" fill="#1e293b"/>
    <circle cx="180" cy="318" r="22" fill="#fbbf24" stroke="#92400e" stroke-width="2"/>
    <circle cx="180" cy="318" r="11" fill="#1e293b"/>
    <circle cx="325" cy="318" r="20" fill="#fbbf24" stroke="#92400e" stroke-width="2"/>
    <circle cx="325" cy="318" r="10" fill="#1e293b"/>
    <!-- 본체 -->
    <rect x="30" y="160" width="290" height="135" rx="8" fill="#fbbf24" stroke="#92400e" stroke-width="3"/>
    <rect x="30" y="160" width="290" height="40" fill="#f59e0b"/>
    <!-- 환기구 -->
    <g fill="#0f172a" opacity="0.6">
      <rect x="50" y="220" width="12" height="40"/>
      <rect x="70" y="220" width="12" height="40"/>
      <rect x="90" y="220" width="12" height="40"/>
    </g>
    <!-- 캐빈 -->
    <path d="M50,160 L80,80 L220,80 L260,160 Z" fill="#fbbf24" stroke="#92400e" stroke-width="3"/>
    <!-- 유리창 -->
    <path d="M88,95 L210,95 L240,155 L72,155 Z" fill="#7dd3fc" stroke="#0c4a6e" stroke-width="2" opacity="0.85"/>
    <!-- 운전자 (실루엣) -->
    <ellipse cx="156" cy="125" rx="16" ry="18" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="1.5"/>
    <path d="M138,120 Q138,108 156,108 Q174,108 174,120 L174,124 L138,124 Z" fill="white" stroke="#475569" stroke-width="1.5"/>
    <rect x="138" y="140" width="36" height="20" fill="url(#vestGrad)"/>
    <!-- 붐 (arm) -->
    <path d="M210,180 L420,90 L460,150 L250,240 Z" fill="#fbbf24" stroke="#92400e" stroke-width="3"/>
    <path d="M420,90 L500,200 L460,240 L380,140 Z" fill="#fbbf24" stroke="#92400e" stroke-width="3"/>
    <!-- 버킷 -->
    <path d="M460,225 L550,235 L540,320 L470,310 Z" fill="#525252" stroke="#1e293b" stroke-width="3"/>
    <path d="M460,225 L550,235 L552,245 L462,235 Z" fill="#737373"/>
  </g>
  
  <!-- 신호수 (디테일한 작업자) -->
  <g transform="translate(280, 540)" filter="url(#softShadow)">
    <ellipse cx="0" cy="240" rx="60" ry="9" fill="#000" opacity="0.25"/>
    <!-- 다리 -->
    <path d="M-22,150 L-25,238 L-15,240 L-10,160 Z" fill="url(#pantsGrad)" stroke="#0f172a" stroke-width="1.5"/>
    <path d="M10,160 L15,240 L25,238 L22,150 Z" fill="url(#pantsGrad)" stroke="#0f172a" stroke-width="1.5"/>
    <ellipse cx="-20" cy="242" rx="20" ry="6" fill="#0f172a"/>
    <ellipse cx="20" cy="242" rx="20" ry="6" fill="#0f172a"/>
    <rect x="-38" y="237" width="36" height="3" fill="#fbbf24"/>
    <rect x="2" y="237" width="36" height="3" fill="#fbbf24"/>
    <!-- 안전조끼 (형광 노랑) -->
    <path d="M-40,70 L40,70 L42,160 L-42,160 Z" fill="#fef08a" stroke="#a16207" stroke-width="2"/>
    <rect x="-42" y="100" width="84" height="6" fill="#7c2d12"/>
    <rect x="-42" y="135" width="84" height="6" fill="#7c2d12"/>
    <!-- 팔 (한 손은 깃발 들고) -->
    <path d="M-38,75 Q-50,110 -50,150 L-40,153 L-30,82 Z" fill="#fef08a" stroke="#a16207" stroke-width="2"/>
    <!-- 위로 든 팔 (깃발) -->
    <path d="M38,75 Q60,40 80,-10 L70,-15 L28,72 Z" fill="#fef08a" stroke="#a16207" stroke-width="2"/>
    <!-- 손 (깃발 잡고 있음) -->
    <circle cx="78" cy="-10" r="10" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="1.5"/>
    <circle cx="-45" cy="150" r="9" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="1.5"/>
    <!-- 깃발 막대 -->
    <line x1="80" y1="-10" x2="100" y2="-130" stroke="#1e293b" stroke-width="5" stroke-linecap="round"/>
    <!-- 깃발 -->
    <path d="M100,-130 L180,-115 L170,-65 L95,-80 Z" fill="#dc2626" stroke="#7f1d1d" stroke-width="3"/>
    <text x="135" y="-87" text-anchor="middle" font-size="28" font-weight="900" fill="white" style="font-family:sans-serif">STOP</text>
    <!-- 머리 -->
    <ellipse cx="0" cy="32" rx="26" ry="29" fill="url(#skinGrad)" stroke="#9a3412" stroke-width="2"/>
    <!-- 얼굴 -->
    <ellipse cx="-9" cy="33" rx="2.5" ry="3" fill="#1e293b"/>
    <ellipse cx="9" cy="33" rx="2.5" ry="3" fill="#1e293b"/>
    <path d="M-5,46 Q0,49 5,46" fill="none" stroke="#9a3412" stroke-width="2" stroke-linecap="round"/>
    <!-- 노란 안전모 -->
    <path d="M-30,30 Q-30,-6 0,-12 Q30,-6 30,30 L30,34 L-30,34 Z" fill="url(#helmetYellow)" stroke="#1e293b" stroke-width="2"/>
    <ellipse cx="0" cy="6" rx="32" ry="6" fill="#f59e0b"/>
    <path d="M-30,34 L-34,40 L34,40 L30,34 Z" fill="#92400e" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M-22,45 Q0,55 22,45" fill="none" stroke="#9a3412" stroke-width="1.5"/>
  </g>
  
  <!-- 안전 라벨 1: 신호수 배치 -->
  <g transform="translate(180, 320)" filter="url(#softShadow)">
    <rect x="-100" y="-32" width="200" height="64" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="20" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">신호수 배치</text>
    <text x="0" y="22" text-anchor="middle" font-size="16" font-weight="800" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">(2인 1조 작업)</text>
    <path d="M30,35 L120,200" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowR)"/>
  </g>
  
  <!-- 안전 라벨 2: 안전거리 -->
  <g transform="translate(560, 800)" filter="url(#softShadow)">
    <rect x="-85" y="-25" width="170" height="50" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <text x="0" y="-3" text-anchor="middle" font-size="14" font-weight="900" fill="#dc2626" style="font-family:&apos;Pretendard&apos;,sans-serif">⚠ 안전거리</text>
    <text x="0" y="17" text-anchor="middle" font-size="14" font-weight="900" fill="#dc2626" style="font-family:&apos;Pretendard&apos;,sans-serif">3M 이상 유지</text>
  </g>
  
  <g transform="translate(640, 55)">
    <rect x="-220" y="-26" width="440" height="52" rx="26" fill="white" stroke="#5b47eb" stroke-width="3" filter="url(#softShadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#5b47eb" style="font-family:&apos;Pretendard&apos;,sans-serif">✦ 2인 1조 작업 + 신호수 배치</text>
  </g>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#5b47eb"/>
    <text x="45" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5" style="font-family:sans-serif">AI ✦ SAFEG</text>
  </g>
</svg>