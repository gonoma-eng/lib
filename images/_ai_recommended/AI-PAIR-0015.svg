<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bgSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <!-- 안전조끼 (주황) -->
    <linearGradient id="vestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <!-- 흰색 안전모 -->
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- 노란 안전모 -->
    <linearGradient id="helmetYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 청바지/회색 바지 -->
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- 피부톤 -->
    <radialGradient id="skinGrad" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <!-- 노란 안전대 -->
    <linearGradient id="harnessGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <!-- 부드러운 그림자 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1280" height="960" fill="#fef9c3"/>
  <rect x="0" y="700" width="1280" height="260" fill="#a8a29e"/>
  
  <!-- 모터 + V-벨트 시스템 + 방호울 -->
  <g transform="translate(440, 380)" filter="url(#softShadow)">
    <!-- 방호울 (격자 케이지) -->
    <rect x="0" y="0" width="600" height="320" rx="14" fill="none" stroke="#16a34a" stroke-width="7"/>
    <rect x="0" y="0" width="600" height="320" rx="14" fill="#bbf7d0" opacity="0.15"/>
    <g stroke="#16a34a" stroke-width="3" opacity="0.65" fill="none">
      <line x1="0" y1="64" x2="600" y2="64"/>
      <line x1="0" y1="128" x2="600" y2="128"/>
      <line x1="0" y1="192" x2="600" y2="192"/>
      <line x1="0" y1="256" x2="600" y2="256"/>
      <line x1="75" y1="0" x2="75" y2="320"/>
      <line x1="150" y1="0" x2="150" y2="320"/>
      <line x1="225" y1="0" x2="225" y2="320"/>
      <line x1="300" y1="0" x2="300" y2="320"/>
      <line x1="375" y1="0" x2="375" y2="320"/>
      <line x1="450" y1="0" x2="450" y2="320"/>
      <line x1="525" y1="0" x2="525" y2="320"/>
    </g>
    <!-- 모터 (안쪽) -->
    <rect x="60" y="80" width="160" height="170" rx="10" fill="#64748b" stroke="#1e293b" stroke-width="2"/>
    <rect x="60" y="80" width="160" height="40" rx="10" fill="#94a3b8"/>
    <text x="140" y="105" text-anchor="middle" font-size="14" font-weight="900" fill="#fbbf24" letter-spacing="2" style="font-family:sans-serif">MOTOR</text>
    <g fill="#1e293b">
      <rect x="80" y="140" width="6" height="100"/>
      <rect x="100" y="140" width="6" height="100"/>
      <rect x="120" y="140" width="6" height="100"/>
      <rect x="140" y="140" width="6" height="100"/>
      <rect x="160" y="140" width="6" height="100"/>
      <rect x="180" y="140" width="6" height="100"/>
      <rect x="200" y="140" width="6" height="100"/>
    </g>
    <!-- 풀리 -->
    <circle cx="220" cy="160" r="30" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
    <circle cx="220" cy="160" r="22" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="220" cy="160" r="8" fill="#fbbf24"/>
    <!-- 큰 풀리 -->
    <circle cx="460" cy="190" r="85" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
    <circle cx="460" cy="190" r="70" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="460" cy="190" r="20" fill="#0f172a"/>
    <circle cx="460" cy="190" r="10" fill="#fbbf24"/>
    <g stroke="#0f172a" stroke-width="4" fill="none">
      <line x1="380" y1="190" x2="440" y2="190"/>
      <line x1="480" y1="190" x2="540" y2="190"/>
      <line x1="460" y1="115" x2="460" y2="175"/>
      <line x1="460" y1="205" x2="460" y2="265"/>
    </g>
    <!-- V-벨트 -->
    <path d="M220,135 Q340,125 380,160 M220,185 Q340,200 380,220" stroke="#1e293b" stroke-width="12" fill="none"/>
  </g>
  
  <!-- 방호울 라벨 -->
  <g transform="translate(180, 380)" filter="url(#softShadow)">
    <rect x="-100" y="-32" width="200" height="64" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="20" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">V-벨트</text>
    <text x="0" y="22" text-anchor="middle" font-size="20" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">방호울 설치</text>
    <path d="M70,30 L260,250" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowR)"/>
  </g>
  
  <g transform="translate(640, 55)">
    <rect x="-200" y="-26" width="400" height="52" rx="26" fill="white" stroke="#5b47eb" stroke-width="3" filter="url(#softShadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#5b47eb" style="font-family:&apos;Pretendard&apos;,sans-serif">✦ V-벨트 동력전달부 방호울</text>
  </g>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#5b47eb"/>
    <text x="45" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5" style="font-family:sans-serif">AI ✦ SAFEG</text>
  </g>
</svg>