    <text x="0" y="5" text-anchor="middle" font-size="13" font-weight="500" fill="white" style="font-family:&apos;Pretendard&apos;,sans-serif">SAFEG-Lexia · PAIR-0003 · 강릉농협 · 2025 · 📋 안전보건규칙 제87조(원동기ㆍ회전축등의 위험방지)</text>
