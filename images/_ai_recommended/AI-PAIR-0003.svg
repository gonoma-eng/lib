  <!-- 상단 라벨 -->
  <g transform="translate(640, 55)">
    <rect x="-300" y="-26" width="600" height="52" rx="26" fill="white" stroke="#5b47eb" stroke-width="3" filter="url(#softShadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="20" font-weight="700" fill="#5b47eb" style="font-family:&apos;Pretendard&apos;,sans-serif">✦ 구동부 방호덮개 설치</text>
