<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960">
  <defs>
    <linearGradient id="bgWarm18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/><stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="floor18b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8a29e"/><stop offset="100%" stop-color="#57534e"/>
    </linearGradient>
    <linearGradient id="cover18b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="50%" stop-color="#facc15"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="vest18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="helmet18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="pants18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b5563"/><stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="skin18" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#fdba74"/>
    </radialGradient>
    <radialGradient id="hole18b" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="softS18"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="0" dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <rect width="1280" height="960" fill="url(#bgWarm18)"/>
  
  <!-- 기계실 벽 (배경) -->
  <rect x="0" y="0" width="1280" height="540" fill="#fefce8"/>
  <g stroke="#a16207" stroke-width="1" opacity="0.3">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="540"/>
    <line x1="800" y1="0" x2="800" y2="540"/>
  </g>
  
  <!-- 콘크리트 바닥 -->
  <rect x="0" y="540" width="1280" height="420" fill="url(#floor18b)"/>
  <g stroke="#44403c" stroke-width="2" opacity="0.4">
    <line x1="0" y1="650" x2="1280" y2="650"/>
    <line x1="0" y1="780" x2="1280" y2="780"/>
    <line x1="0" y1="900" x2="1280" y2="900"/>
    <line x1="300" y1="540" x2="320" y2="960"/>
    <line x1="700" y1="540" x2="710" y2="960"/>
    <line x1="1000" y1="540" x2="1020" y2="960"/>
  </g>
  
  <!-- 개구부 (덮개 설치 모습) -->
  <g transform="translate(330, 660)" filter="url(#softS18)">
    <!-- 깊이감 - 개구부 안쪽 어둠 (덮개 가장자리만 보임) -->
    <path d="M20,30 L420,15 L425,165 L25,180 Z" fill="url(#hole18b)" opacity="0.6"/>
    <!-- 안전 덮개 (그릴) -->
    <path d="M0,20 L440,5 L450,180 L10,200 Z" fill="url(#cover18b)" stroke="#7c2d12" stroke-width="5"/>
    <!-- 그릴 패턴 -->
    <g stroke="#7c2d12" stroke-width="3" opacity="0.7" fill="none">
      <line x1="50" y1="18" x2="60" y2="195"/>
      <line x1="110" y1="14" x2="125" y2="193"/>
      <line x1="170" y1="11" x2="190" y2="190"/>
      <line x1="230" y1="9" x2="255" y2="188"/>
      <line x1="290" y1="7" x2="320" y2="185"/>
      <line x1="350" y1="6" x2="385" y2="183"/>
      <line x1="410" y1="5" x2="445" y2="180"/>
      <line x1="5" y1="60" x2="445" y2="48"/>
      <line x1="8" y1="110" x2="448" y2="100"/>
      <line x1="10" y1="155" x2="450" y2="148"/>
    </g>
    <!-- 검정/노랑 안전 줄무늬 (가장자리) -->
    <g fill="#1f2937">
      <path d="M0,20 L40,18 L42,32 L0,34 Z"/>
      <path d="M80,16 L120,14 L122,28 L82,30 Z"/>
      <path d="M160,12 L200,10 L202,24 L162,26 Z"/>
      <path d="M240,8 L280,6 L282,20 L242,22 Z"/>
      <path d="M320,5 L360,3 L362,17 L322,19 Z"/>
      <path d="M400,2 L440,0 L442,14 L402,16 Z"/>
    </g>
    <!-- 중앙 안전 메시지 -->
