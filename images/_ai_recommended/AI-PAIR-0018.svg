      <text x="0" y="0" text-anchor="middle" font-size="14" font-weight="900" fill="#dc2626" style="font-family:&apos;Pretendard&apos;,sans-serif">⚠ 개구부 덮개</text>
      <text x="0" y="18" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626" style="font-family:&apos;Pretendard&apos;,sans-serif">제거 금지</text>
    </g>
  </g>
  
  <!-- 작업자 (덮개 옆에 서 있는 자세) -->
  <g transform="translate(900, 540)" filter="url(#softS18)">
    <!-- 그림자 -->
    <ellipse cx="0" cy="285" rx="65" ry="10" fill="#000" opacity="0.3"/>
    
    <!-- 다리 -->
    <path d="M-28,180 L-28,278 L-10,282 L-13,190 Z" fill="url(#pants18)" stroke="#1e293b" stroke-width="2"/>
    <path d="M13,190 L10,282 L28,278 L28,180 Z" fill="url(#pants18)" stroke="#1e293b" stroke-width="2"/>
    
    <!-- 안전화 -->
    <ellipse cx="-20" cy="282" rx="22" ry="8" fill="#0f172a"/>
    <ellipse cx="20" cy="282" rx="22" ry="8" fill="#0f172a"/>
    <rect x="-40" y="278" width="40" height="3" fill="#fbbf24"/>
    <rect x="0" y="278" width="40" height="3" fill="#fbbf24"/>
    
    <!-- 몸통 (안전조끼) -->
    <path d="M-42,100 L42,100 L48,200 L-48,200 Z" fill="url(#vest18)" stroke="#9a3412" stroke-width="2.5"/>
    <rect x="-48" y="135" width="96" height="5" fill="#fef3c7"/>
    <rect x="-48" y="170" width="96" height="5" fill="#fef3c7"/>
    
    <!-- 팔 (한 손은 손짓, 한 손은 밑) -->
    <path d="M-42,108 Q-58,150 -65,175 L-50,180 L-32,118 Z" fill="url(#vest18)" stroke="#9a3412" stroke-width="2"/>
    <path d="M42,108 Q60,90 75,60 L65,52 L30,100 Z" fill="url(#vest18)" stroke="#9a3412" stroke-width="2"/>
    <circle cx="-57" cy="175" r="9" fill="url(#skin18)" stroke="#9a3412" stroke-width="1.5"/>
    <circle cx="70" cy="56" r="9" fill="url(#skin18)" stroke="#9a3412" stroke-width="1.5"/>
    
    <!-- 머리 -->
    <circle cx="0" cy="62" r="26" fill="url(#skin18)" stroke="#9a3412" stroke-width="2"/>
    <circle cx="-8" cy="62" r="2.5" fill="#1e293b"/>
    <circle cx="8" cy="62" r="2.5" fill="#1e293b"/>
    <path d="M-6,73 Q0,77 6,73" fill="none" stroke="#9a3412" stroke-width="2"/>
    
    <!-- 노란 안전모 -->
    <path d="M-30,60 Q0,22 30,60 L30,63 L-30,63 Z" fill="url(#helmet18)" stroke="#7c2d12" stroke-width="2.5"/>
    <ellipse cx="0" cy="43" rx="32" ry="5" fill="#f59e0b"/>
    <path d="M-30,63 L-32,68 L32,68 L30,63 Z" fill="#d97706" stroke="#7c2d12" stroke-width="2"/>
  </g>
  
  <!-- 안전 메시지 라벨 1: "개구부 덮개 설치" (좌상) -->
  <g transform="translate(220, 350)" filter="url(#softS18)">
    <rect x="-95" y="-32" width="190" height="64" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">개구부 덮개</text>
    <text x="0" y="20" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">설치</text>
    <path d="M0,35 L130,290" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrL18)"/>
  </g>
  
  <!-- 안전 메시지 라벨 2: "보호구 착용" (우상) -->
  <g transform="translate(1080, 280)" filter="url(#softS18)">
    <rect x="-90" y="-32" width="180" height="64" rx="10" fill="#fde047" stroke="#1e293b" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">개인 보호구</text>
    <text x="0" y="20" text-anchor="middle" font-size="18" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">착용 철저</text>
    <path d="M-50,35 L-170,260" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrL18)"/>
  </g>
  
  <!-- 추락 주의 표지판 (좌측 -->
  <g transform="translate(140, 660)" filter="url(#softS18)">
    <rect x="-7" y="120" width="14" height="100" fill="#525252"/>
    <ellipse cx="0" cy="225" rx="30" ry="6" fill="#525252"/>
    <!-- 삼각 표지 -->
    <path d="M0,0 L70,120 L-70,120 Z" fill="#fde047" stroke="#dc2626" stroke-width="5" stroke-linejoin="round"/>
    <!-- 떨어지는 사람 픽토그램 -->
    <g transform="translate(0, 80)" fill="#1e293b">
      <circle cx="-3" cy="-22" r="7"/>
      <path d="M-18,-10 L-3,-10 L0,3 L13,-3 L18,3 L0,10 L-13,10 Z"/>
      <path d="M-5,10 L-15,25 L-10,28 L-2,12 Z"/>
      <path d="M5,10 L15,25 L10,28 L2,12 Z"/>
      <line x1="-30" y1="35" x2="30" y2="35" stroke="#1e293b" stroke-width="4"/>
    </g>
    <text x="0" y="155" text-anchor="middle" font-size="16" font-weight="900" fill="#1e293b" style="font-family:&apos;Pretendard&apos;,sans-serif">추락 주의</text>
  </g>
  
  <defs>
    <marker id="arrL18" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#dc2626"/>
    </marker>
  </defs>
  
  <!-- 상단 라벨 -->
  <g transform="translate(640, 55)">
    <rect x="-220" y="-26" width="440" height="52" rx="26" fill="white" stroke="#5b47eb" stroke-width="3" filter="url(#softS18)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#5b47eb" style="font-family:&apos;Pretendard&apos;,sans-serif">✦ 개구부 덮개 + 안전표지 + PPE</text>
  </g>
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#5b47eb"/>
    <text x="45" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="1.5" style="font-family:sans-serif">AI ✦ SAFEG</text>
  </g>
