  </defs>
  <rect width="1280" height="960" fill="#f1f5f9"/>
  
  
        <defs>
          <pattern id="tile_PAIR-0011" width="80" height="80" patternUnits="userSpaceOnUse">
            <rect width="80" height="80" fill="#e2e8f0"/>
            <line x1="0" y1="0" x2="80" y2="0" stroke="#cbd5e1" stroke-width="2"/>
            <line x1="0" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="2"/>
          </pattern>
        </defs>
        <rect x="0" y="120" width="1280" height="840" fill="url(#tile_PAIR-0011)"/>
        <!-- 큰 안전 표지판 (스튜디오 사진풍) -->
        <g transform="translate(640, 540)" filter="url(#shadow_llm)">
          <rect x="-10" y="200" width="20" height="180" fill="#1e293b"/>
          <ellipse cx="0" cy="385" rx="80" ry="14" fill="#1e293b"/>
          <path d="M0,-180 L200,180 L-200,180 Z" fill="#facc15" stroke="#7c2d12" stroke-width="10" stroke-linejoin="round"/>
          <g transform="translate(0, 60)" fill="#1e293b">
