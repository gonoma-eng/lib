            <path d="M-50,-25 Q-60,5 -25,15 L25,15 L40,30 L0,30 L-40,15 Z"/>
            <path d="M15,5 L50,30 L70,55 L60,60 L40,40 L0,15 Z"/>
            <line x1="-65" y1="55" x2="65" y2="55" stroke="#1e293b" stroke-width="8"/>
          </g>
          <text x="0" y="135" text-anchor="middle" font-size="32" font-weight="900" fill="#1e293b" style="font-family:sans-serif">WET FLOOR</text>
        </g>
  
  <!-- 상단 라벨 (여백 최소화) -->
  <g transform="translate(640, 55)">
    <rect x="-200" y="-26" width="400" height="52" rx="26" fill="white" stroke="#0ea5e9" stroke-width="3" filter="url(#shadow_llm)"/>
    <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="#0ea5e9" style="font-family:&apos;Pretendard&apos;,sans-serif">🤖 LLM 추천: 미끄럼방지 + 안전표지</text>
